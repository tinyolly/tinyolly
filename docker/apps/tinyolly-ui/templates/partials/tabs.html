<div class="tabs">
    <button class="tab active" onclick="switchTab('logs', this)" data-tab="logs">Logs</button>
    <button class="tab" onclick="switchTab('metrics', this)" data-tab="metrics">Metrics</button>
    <button class="tab" onclick="switchTab('traces', this)" data-tab="traces">Traces</button>
    <button class="tab" onclick="switchTab('spans', this)" data-tab="spans">Spans</button>
    <button class="tab" onclick="switchTab('catalog', this)" data-tab="catalog">APM Service Catalog</button>
    <button class="tab" onclick="switchTab('map', this)" data-tab="map">APM Service Map</button>
    <button class="tab" onclick="switchTab('ai-agents', this)" data-tab="ai-agents">AI Agents</button>
    <button class="tab" onclick="switchTab('collector', this)" data-tab="collector">OpenTelemetry Collector + OpAMP
        Config</button>
    <div style="margin-left: auto; display: flex; align-items: center; padding-bottom: 0;">
        <button onclick="toggleAutoRefresh()" title="Pause auto-refresh" id="auto-refresh-btn" class="pause-btn" aria-pressed="true">
            <span id="refresh-icon" class="pause-btn-icon">⏸</span>
            <span class="pause-btn-labels">
                <span id="refresh-state" class="pause-btn-state">LIVE</span>
                <span id="refresh-text" class="pause-btn-text">Pause Auto-Refresh</span>
            </span>
        </button>
    </div>
</div>
