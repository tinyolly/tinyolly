apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinyolly-ui
  labels:
    app: tinyolly-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinyolly-ui
  template:
    metadata:
      labels:
        app: tinyolly-ui
    spec:
      containers:
      - name: tinyolly-ui
        image: tinyolly/ui:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5002
        env:
        - name: STORAGE_BACKEND
          value: "sqlite"
        - name: SQLITE_DB_PATH
          value: "/data/tinyolly.db"
        - name: MAX_DB_SIZE_MB
          value: "768"
        - name: DEPLOYMENT_ENV
          value: "kubernetes-core"
        - name: OTEL_SERVICE_NAME
          value: "tinyolly-ui"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://tinyolly-otlp-receiver:4343"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
          value: "http://tinyolly-otlp-receiver:4343"
        - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
          value: "http://tinyolly-otlp-receiver:4343"
        - name: OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
          value: "http://tinyolly-otlp-receiver:4343"
        - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
          value: "true"
        - name: OPAMP_SERVER_URL
          value: "http://tinyolly-opamp-server:4321"
        - name: OTELCOL_DEFAULT_CONFIG
          value: "/app/otelcol-config.yaml"
        volumeMounts:
        - name: tinyolly-db
          mountPath: /data
        - name: otelcol-config-vol
          mountPath: /app/otelcol-config.yaml
          subPath: otel-collector-config.yaml
        - name: otelcol-templates-vol
          mountPath: /app/otelcol-templates
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: tinyolly-db
        persistentVolumeClaim:
          claimName: tinyolly-db
      - name: otelcol-config-vol
        configMap:
          name: otel-collector-config
      - name: otelcol-templates-vol
        configMap:
          name: otelcol-templates
---
apiVersion: v1
kind: Service
metadata:
  name: tinyolly-ui
spec:
  type: LoadBalancer
  selector:
    app: tinyolly-ui
  ports:
    - protocol: TCP
      port: 5002
      targetPort: 5002
